name: DAP storage behavior report
description: Report Android 11+ DAP SD card behavior for one app or device
title: "[Report] <device> / <app> / Android <version>"
labels:
  - compatibility-report
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report.

        Please include enough detail to compare your result with the existing Walkman test.
        The main point is to separate app migration from offline-data behavior.

  - type: input
    id: device_model
    attributes:
      label: Device model
      description: Example: Sony Walkman NW-A306, NW-ZX707, iBasso DX320
      placeholder: Sony Walkman NW-A306
    validations:
      required: true

  - type: input
    id: android_version
    attributes:
      label: Android version
      description: Example: Android 11, Android 12, Android 13
      placeholder: Android 11
    validations:
      required: true

  - type: input
    id: firmware_region
    attributes:
      label: Firmware / region
      description: Example: China ROM, Global ROM, International version
      placeholder: Global ROM
    validations:
      required: false

  - type: input
    id: app_name
    attributes:
      label: App name
      description: Example: QQ Music, Spotify, Apple Music, NetEase Cloud Music
      placeholder: QQ Music
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: App version
      description: Optional, but useful when app behavior changes between releases
      placeholder: 13.5.0
    validations:
      required: false

  - type: dropdown
    id: ui_move_available
    attributes:
      label: Is UI app migration available?
      description: Can the app be moved from the system Settings UI?
      options:
        - Yes
        - No
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: package_moved
    attributes:
      label: Did the app package actually move?
      description: Prefer ADB evidence such as pm path or volumeUuid. Choose Not tested if you only checked the UI.
      options:
        - Yes
        - No
        - Not tested
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: offline_data_follows
    attributes:
      label: Did offline data follow the app migration?
      description: Example: songs, downloads, cache
      options:
        - Yes
        - No
        - Partial / mixed
        - Not tested
    validations:
      required: true

  - type: dropdown
    id: adb_used
    attributes:
      label: Was ADB verification used?
      description: Did you verify with commands such as pm path, dumpsys package, or df -h?
      options:
        - Yes
        - No
    validations:
      required: true

  - type: textarea
    id: adb_commands
    attributes:
      label: ADB commands and observations
      description: Paste the commands you used and the relevant output or summary
      placeholder: |
        adb shell pm path <package>
        adb shell dumpsys package <package> | findstr volumeUuid
        adb shell df -h /storage/emulated
        adb shell df -h /mnt/expand/<UUID>

        Observation:
        - pm path changed to external-side storage
        - offline data still grew under /storage/emulated
    validations:
      required: false

  - type: textarea
    id: reproduction_steps
    attributes:
      label: Reproduction steps
      description: Write the order you used. Short steps are fine.
      placeholder: |
        1. Enable USB debugging
        2. Install app
        3. Launch once, then close it
        4. Move app in Settings → Storage → Apps → Storage location
        5. Verify with ADB
    validations:
      required: true

  - type: textarea
    id: result_summary
    attributes:
      label: Result summary
      description: State what moved and what did not move
      placeholder: App package moved, but offline song data remained in shared internal storage.
    validations:
      required: true

  - type: textarea
    id: mtp_observation
    attributes:
      label: Windows / MTP observation
      description: Optional. Note what Windows or MTP showed after the test.
      placeholder: Windows MTP still showed only about 103GB.
    validations:
      required: false

  - type: textarea
    id: additional_notes
    attributes:
      label: Additional notes
      description: Add screenshots, region-specific behavior, or anything else useful
      placeholder: China ROM / Global ROM difference, unusual app behavior, or screenshots.
    validations:
      required: false
